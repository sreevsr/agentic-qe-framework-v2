[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: Smoke tests
    regression: Regression tests
    api: API tests
    hybrid: Hybrid (UI + API) tests
    P0: Priority 0 (critical)
    P1: Priority 1 (high)
    P2: Priority 2 (medium)
addopts = -v --tb=short
